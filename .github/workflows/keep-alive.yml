name: Keep HF Space Awake

on:
  schedule:
    - cron: '*/30 * * * *'  # every 30 minutes
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Curl Space root
        run: |
          curl -fsS --max-time 30 "https://yashkankhareyk-ragforge.hf.space/" || true

      - name: Curl API health (if available)
        run: |
          curl -fsS --max-time 30 "https://yashkankhareyk-ragforge.hf.space/api/health" || true
